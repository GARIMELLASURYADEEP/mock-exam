<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA Mock Test - Examination</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="exam-body">
    <header class="exam-header">
        <div class="logo">
            <img src="https://nta.ac.in/img/nta_logo.png" alt="NTA Logo" onerror="this.src='https://via.placeholder.com/150x50?text=Mock+Test'">
            <div class="exam-title">Mock Examination - Communication Skill</div>
        </div>
        <div class="timer-container">
            <div class="timer-label">Time Left:</div>
            <div id="timer" class="timer-display">30:00</div>
        </div>
    </header>

    <div class="exam-main">
        <!-- Sidebar Toggle for Mobile -->
        <div class="exam-content">
            <div class="question-header">
                <h2 id="question-number">Question No. 1</h2>
            </div>
            <div class="question-container">
                <p id="question-text" class="question-text">Loading question...</p>
                <div id="options-container" class="options-grid">
                    <!-- Options will be injected here -->
                </div>
            </div>
            <div class="exam-footer">
                <div class="left-btns">
                    <button id="mark-review-btn" class="btn btn-purple">Mark for Review & Next</button>
                    <button id="clear-response-btn" class="btn btn-outline">Clear Response</button>
                </div>
                <div class="right-btns">
                    <button id="prev-btn" class="btn btn-secondary">Previous</button>
                    <button id="save-next-btn" class="btn btn-primary">Save & Next</button>
                </div>
            </div>
        </div>

        <aside class="exam-sidebar">
            <div class="user-profile">
                <div class="avatar">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="User">
                </div>
                <div class="user-info">
                    <span class="user-name">Candidate Name</span>
                </div>
            </div>

            <div class="palette-container">
                <h3>Question Palette</h3>
                <div id="question-palette" class="palette-grid">
                    <!-- Palette buttons 1-30 -->
                </div>
            </div>

            <div class="legend-container">
                <div class="legend-item"><span class="badge green">0</span> Answered</div>
                <div class="legend-item"><span class="badge red">0</span> Not Answered</div>
                <div class="legend-item"><span class="badge purple">0</span> Marked for Review</div>
                <div class="legend-item"><span class="badge grey">0</span> Not Visited</div>
            </div>

            <div class="submit-container">
                <button id="submit-test-btn" class="btn btn-danger btn-block">Submit Test</button>
            </div>
        </aside>
    </div>

    <!-- Confirmation Modal -->
    <div id="submit-modal" class="modal">
        <div class="modal-content">
            <h3>Confirm Submission</h3>
            <p>Are you sure you want to submit the test? You cannot change your answers after submission.</p>
            <div class="modal-footer">
                <button id="cancel-submit" class="btn btn-secondary">Cancel</button>
                <button id="confirm-submit" class="btn btn-danger">Confirm Submit</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
