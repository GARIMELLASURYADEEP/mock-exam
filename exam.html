<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity3D Exam Arena - Exam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="exam-body">
    <header class="exam-header">
        <div class="logo">
            <div class="logo-icon">🎮</div>
            <div class="exam-title">Unity3D Exam Arena</div>
        </div>
        <div class="timer-container">
            <div class="timer-label">Time Left:</div>
            <div id="timer" class="timer-display">120:00</div>
        </div>
    </header>

    <div class="exam-main">
        <div class="exam-content">
            <div class="question-header">
                <h2 id="question-number">Question No. 1</h2>
            </div>
            <div class="question-container">
                <p id="question-text" class="question-text">Loading mission...</p>
                <div id="options-container" class="options-grid"></div>
            </div>
            <div class="exam-footer">
                <div class="left-btns">
                    <button id="mark-review-btn" class="btn btn-purple">Mark for Review</button>
                    <button id="clear-response-btn" class="btn btn-outline">Clear Response</button>
                </div>
                <div class="right-btns">
                    <button id="prev-btn" class="btn btn-secondary">Previous</button>
                    <button id="save-next-btn" class="btn btn-primary">Save & Next</button>
                </div>
            </div>
        </div>

        <aside class="exam-sidebar">
            <div class="user-profile">
                <div class="avatar">U</div>
                <div class="user-info">
                    <span class="user-name">Candidate</span>
                </div>
            </div>

            <div class="palette-container">
                <h3>Mission Palette</h3>
                <div id="question-palette" class="palette-grid"></div>
            </div>

            <div class="legend-container">
                <div class="legend-item"><span class="badge green"></span> Answered</div>
                <div class="legend-item"><span class="badge red"></span> Not Answered</div>
                <div class="legend-item"><span class="badge purple"></span> Marked</div>
                <div class="legend-item"><span class="badge grey"></span> Not Visited</div>
            </div>

            <div class="submit-container">
                <button id="submit-test-btn" class="btn btn-danger btn-block">Submit Mission</button>
            </div>
        </aside>
    </div>

    <div id="submit-modal" class="modal">
        <div class="modal-content">
            <h3>Confirm Mission Finish</h3>
            <p>Are you sure you want to submit your run? You will see your score and summary.</p>
            <div class="modal-footer">
                <button id="cancel-submit" class="btn btn-secondary">Cancel</button>
                <button id="confirm-submit" class="btn btn-danger">Confirm Submit</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
