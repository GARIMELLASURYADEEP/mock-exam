<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity3D Exam Arena - Results</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="result-body">
    <header class="main-header">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">🎮</div>
                <span>Mission Results</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="result-card">
            <h1>Mission Summary</h1>
            <div class="score-circle">
                <span id="score-percentage">0%</span>
                <p>Score</p>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Total Questions</span>
                    <span id="total-questions" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Attempted</span>
                    <span id="attempted" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Correct</span>
                    <span id="correct-answers" class="stat-value green-text">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Wrong</span>
                    <span id="wrong-answers" class="stat-value red-text">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Net Score</span>
                    <span id="net-score" class="stat-value green-text">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Negative Marks</span>
                    <span id="negative-marks" class="stat-value red-text">0</span>
                </div>
            </div>

            <div class="action-footer">
                <button onclick="window.location.href='index.html'" class="btn btn-secondary">Back to Hub</button>
                <button onclick="window.location.href='exam.html?reset=1'" class="btn btn-primary">Replay Mission</button>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>© 2026 Unity3D Exam Arena. Ready for your next challenge.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
